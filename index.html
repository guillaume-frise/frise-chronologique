<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frise Chronologique Interactive - Version 10 (Google Sheets)</title>
    <meta name="description" content="Frise chronologique interactive avec chargement automatique depuis Google Sheets">
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@300;400;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #fafafa;
            --bg-secondary: #ffffff;
            --bg-elevated: #f5f5f5;
            --text-primary: #1a1a1a;
            --text-secondary: #4a4a4a;
            --text-muted: #8a8a8a;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --culturel: #ec4899;
            --sportif: #10b981;
            --politique: #ef4444;
            --economique: #f59e0b;
            --religieux: #8b5cf6;
            --scientifique: #06b6d4;
            --border: rgba(0, 0, 0, 0.08);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.06);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Crimson Pro', serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
        }

        /* ===== NAVIGATION ===== */
        .main-nav {
            background: var(--bg-secondary);
            border-bottom: 2px solid var(--border);
            padding: 1rem 2rem;
            box-shadow: var(--shadow-sm);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-row {
            display: flex;
            gap: 1.5rem;
            align-items: center;
            margin-bottom: 0.75rem;
        }

        .nav-row:last-child {
            margin-bottom: 0;
        }

        .nav-row.space-between {
            justify-content: space-between;
        }

        .nav-section {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .nav-label {
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--text-muted);
            font-weight: 700;
        }

        .nav-buttons {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .nav-btn {
            background: var(--bg-elevated);
            color: var(--text-secondary);
            border: 2px solid transparent;
            border-radius: 8px;
            padding: 0.5rem 1rem;
            font-family: 'Crimson Pro', serif;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .nav-btn:hover:not(:disabled) {
            background: var(--bg-primary);
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: var(--shadow-sm);
        }

        .nav-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
            font-weight: 600;
            box-shadow: var(--shadow-md);
        }

        .nav-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .search-box {
            position: relative;
            flex: 1;
            max-width: 300px;
        }

        .search-box input {
            width: 100%;
            padding: 0.6rem 1rem 0.6rem 2.5rem;
            border: 2px solid var(--border);
            border-radius: 8px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-family: 'Crimson Pro', serif;
            font-size: 0.95rem;
            transition: all 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .search-icon {
            position: absolute;
            left: 0.9rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .search-results {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            margin-top: 0.5rem;
            background: var(--bg-elevated);
            border: 2px solid var(--accent);
            border-radius: 12px;
            box-shadow: var(--shadow-lg);
            max-height: 400px;
            overflow-y: auto;
            z-index: 1000;
        }

        .search-result-item {
            padding: 0.8rem 1rem;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            transition: background 0.2s;
        }

        .search-result-item:hover {
            background: var(--bg-primary);
        }

        .search-result-item:last-child {
            border-bottom: none;
        }

        .search-result-title {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.3rem;
        }

        .search-result-meta {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-family: 'Space Mono', monospace;
        }


        .filters {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 0.5rem 1rem;
            border: 2px solid transparent;
            background: var(--bg-elevated);
            color: var(--text-secondary);
            cursor: pointer;
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-radius: 20px;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .filter-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-sm);
        }

        .filter-btn.active {
            font-weight: 700;
            box-shadow: var(--shadow-md);
        }

        .filter-btn[data-category="all"] { background: var(--accent); color: white; }
        .filter-btn[data-category="all"].active { background: var(--accent-hover); }
        .filter-btn[data-category="culturel"] { border-color: var(--culturel); color: var(--culturel); }
        .filter-btn[data-category="culturel"].active { background: var(--culturel); color: white; }
        .filter-btn[data-category="sportif"] { border-color: var(--sportif); color: var(--sportif); }
        .filter-btn[data-category="sportif"].active { background: var(--sportif); color: white; }
        .filter-btn[data-category="politique"] { border-color: var(--politique); color: var(--politique); }
        .filter-btn[data-category="politique"].active { background: var(--politique); color: white; }
        .filter-btn[data-category="economique"] { border-color: var(--economique); color: var(--economique); }
        .filter-btn[data-category="economique"].active { background: var(--economique); color: white; }
        .filter-btn[data-category="religieux"] { border-color: var(--religieux); color: var(--religieux); }
        .filter-btn[data-category="religieux"].active { background: var(--religieux); color: white; }
        .filter-btn[data-category="scientifique"] { border-color: var(--scientifique); color: var(--scientifique); }
        .filter-btn[data-category="scientifique"].active { background: var(--scientifique); color: white; }

        /* ===== CONTENU ===== */
        .main-content {
            height: calc(100vh - 165px);
            display: flex;
            flex-direction: column;
        }

        .empty-state {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 1rem;
            color: var(--text-muted);
        }

        .empty-state-icon {
            font-size: 4rem;
            opacity: 0.3;
        }

        .empty-state-text {
            font-family: 'Space Mono', monospace;
            font-size: 1.1rem;
            text-align: center;
            max-width: 400px;
            line-height: 1.6;
        }

        .cards-zone {
            height: 200px;
            display: flex;
            align-items: flex-end;
            padding: 0.5rem 0 0 0;
            background: linear-gradient(180deg, var(--bg-primary) 0%, var(--bg-elevated) 100%);
            overflow: visible;
            position: relative;
        }

        .cards-track {
            position: relative;
            height: 100%;
            display: flex;
            align-items: center;
            transition: transform 0.3s ease;
        }

        .event-card {
            background: var(--bg-secondary);
            border: 2px solid var(--border);
            border-radius: 8px;
            padding: 0.5rem;
            width: 240px;
            height: 180px;
            min-width: 240px;
            box-shadow: var(--shadow-lg);
            border-left: 4px solid var(--culturel);
            position: absolute;
            top: 5%;
            z-index: 100;
            cursor: pointer;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }
        
        .event-card.flipped {
            transform: rotateY(180deg);
        }
        
        .event-card-front,
        .event-card-back {
            backface-visibility: hidden;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 0.6rem;
            border-radius: 8px;
            overflow-y: auto;
        }
        
        .event-card-front {
            z-index: 2;
            transform: rotateY(0deg);
            background: var(--bg-secondary);
        }
        
        .event-card-back {
            transform: rotateY(180deg);
            background: var(--bg-elevated);
        }
        
        .event-card-back-title {
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 0.8rem;
            padding-bottom: 0.8rem;
            border-bottom: 2px solid var(--border);
            color: var(--accent);
        }
        
        .event-card-back-context {
            font-size: 0.85rem;
            line-height: 1.6;
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }
        
        .event-card-chatgpt-link {
            display: inline-block;
            background: none;
            color: var(--text-muted);
            padding: 0;
            border-radius: 0;
            text-decoration: none;
            font-size: 0.65rem;
            font-weight: 400;
            transition: all 0.2s ease;
            position: absolute;
            bottom: 0.5rem;
            left: 0.5rem;
            opacity: 0.7;
            font-style: italic;
        }
        
        .event-card-chatgpt-link:hover {
            background: none;
            transform: none;
            box-shadow: none;
            opacity: 1;
            text-decoration: underline;
        }
        
        .event-card-flip-hint {
            position: absolute;
            bottom: 0.5rem;
            right: 0.5rem;
            font-size: 0.65rem;
            color: var(--text-muted);
            opacity: 0.7;
            font-style: italic;
        }

        .event-card::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 40px;
            background: currentColor;
            opacity: 0.4;
            z-index: 100;
        }

        .event-card.culturel { border-left-color: var(--culturel); }
        .event-card.culturel::after { color: var(--culturel); }
        .event-card.sportif { border-left-color: var(--sportif); }
        .event-card.sportif::after { color: var(--sportif); }
        .event-card.politique { border-left-color: var(--politique); }
        .event-card.politique::after { color: var(--politique); }
        .event-card.economique { border-left-color: var(--economique); }
        .event-card.economique::after { color: var(--economique); }
        .event-card.religieux { border-left-color: var(--religieux); }
        .event-card.religieux::after { color: var(--religieux); }
        .event-card.scientifique { border-left-color: var(--scientifique); }
        .event-card.scientifique::after { color: var(--scientifique); }

        .event-card-year {
            font-family: 'Space Mono', monospace;
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 0.15rem;
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .event-card-date {
            color: var(--text-muted);
            font-size: 0.65rem;
            margin-bottom: 0.3rem;
            font-family: 'Space Mono', monospace;
        }

        .event-card-title {
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 0.3rem;
            line-height: 1.2;
        }

        .event-card-location {
            color: var(--text-secondary);
            font-size: 0.7rem;
            margin-bottom: 0.3rem;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .event-card-location::before {
            content: "📍";
            font-size: 0.65rem;
        }

        .event-card-description {
            line-height: 1.3;
            color: var(--text-secondary);
            font-size: 0.75rem;
            margin-bottom: 0.3rem;
        }

        .event-card-category {
            display: inline-block;
            padding: 0.2rem 0.5rem;
            font-family: 'Space Mono', monospace;
            font-size: 0.55rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            border-radius: 10px;
            font-weight: 700;
        }

        .event-card-extra {
            margin-top: 0.5rem;
            padding-top: 0.5rem;
            border-top: 1px solid var(--border);
            font-size: 0.7rem;
            color: var(--text-muted);
            line-height: 1.3;
        }

        .event-card.culturel .event-card-category {
            background: rgba(236, 72, 153, 0.15);
            color: var(--culturel);
            border: 2px solid var(--culturel);
        }
        .event-card.sportif .event-card-category {
            background: rgba(16, 185, 129, 0.15);
            color: var(--sportif);
            border: 2px solid var(--sportif);
        }
        .event-card.politique .event-card-category {
            background: rgba(239, 68, 68, 0.15);
            color: var(--politique);
            border: 2px solid var(--politique);
        }
        .event-card.religieux .event-card-category {
            background: rgba(139, 92, 246, 0.15);
            color: var(--religieux);
            border: 2px solid var(--religieux);
        }
        .event-card.scientifique .event-card-category {
            background: rgba(6, 182, 212, 0.15);
            color: var(--scientifique);
            border: 2px solid var(--scientifique);
        }

        /* ===== FRISE ===== */
        .timeline-container {
            height: 80px;
            position: relative;
            background: var(--bg-secondary);
            border-top: 2px solid var(--border);
            border-bottom: 2px solid var(--border);
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.03);
            z-index: auto;
        }

        .timeline-scroll {
            height: 100%;
            overflow: hidden;
            position: relative;
            cursor: grab;
        }

        .timeline-scroll:active {
            cursor: grabbing;
        }

        .timeline-track {
            height: 100%;
            position: relative;
            transition: transform 0.3s ease;
        }

        .timeline-line {
            position: absolute;
            top: 60%;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--accent) 10%, var(--accent) 90%, transparent);
            transform: translateY(-50%);
            opacity: 0.5;
        }

        .timeline-point {
            position: absolute;
            top: 60%;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--bg-secondary);
            border: 3px solid var(--culturel);
            transform: translate(-50%, -50%);
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 5;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .timeline-point:hover {
            transform: translate(-50%, -50%) scale(1.4);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
        }

        .timeline-point.active {
            transform: translate(-50%, -50%) scale(1.6);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        .timeline-point.culturel { border-color: var(--culturel); }
        .timeline-point.sportif { border-color: var(--sportif); }
        .timeline-point.politique { border-color: var(--politique); }
        .timeline-point.economique { border-color: var(--economique); }
        .timeline-point.religieux { border-color: var(--religieux); }
        .timeline-point.scientifique { border-color: var(--scientifique); }

        .year-label {
            position: absolute;
            top: 60%;
            font-family: 'Space Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-secondary);
            transform: translate(-50%, -200%);
            white-space: nowrap;
            font-weight: 600;
        }

        /* ===== PÉRIODES ===== */
        .periods-zone {
            height: 280px;
            position: relative;
            padding: 0;
            background: var(--bg-primary);
            overflow: visible;
        }

        .periods-track {
            position: relative;
            height: 100%;
            transition: transform 0.3s ease;
        }

        .period-bar {
            position: absolute;
            height: 50px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            padding: 0 1.2rem;
            z-index: 1;
        }

        .period-bar:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-md);
            z-index: 9000;
        }

        .period-bar.active {
            z-index: 9000;
        }

        .period-bar.culturel {
            background: rgba(236, 72, 153, 0.12);
            border: 2px solid rgba(236, 72, 153, 0.5);
        }
        .period-bar.sportif {
            background: rgba(16, 185, 129, 0.12);
            border: 2px solid rgba(16, 185, 129, 0.5);
        }
        .period-bar.politique {
            background: rgba(239, 68, 68, 0.12);
            border: 2px solid rgba(239, 68, 68, 0.5);
        }
        .period-bar.economique {
            background: rgba(245, 158, 11, 0.12);
            border: 2px solid rgba(245, 158, 11, 0.5);
        }
        .period-bar.religieux {
            background: rgba(139, 92, 246, 0.12);
            border: 2px solid rgba(139, 92, 246, 0.5);
        }
        .period-bar.scientifique {
            background: rgba(6, 182, 212, 0.12);
            border: 2px solid rgba(6, 182, 212, 0.5);
        }

        .period-title {
            font-family: 'Space Mono', monospace;
            font-size: 0.85rem;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .period-info {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-secondary);
            border: 2px solid var(--accent);
            border-radius: 12px;
            padding: 1.2rem 1.5rem;
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.3);
            min-width: 500px;
            max-width: 600px;
            min-height: 200px;
            margin-bottom: 4rem;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
            z-index: 9999;
            cursor: pointer;
            transform-style: preserve-3d;
        }
        
        .period-info.flipped {
            transform: translateX(-50%) translateY(-25px) rotateY(180deg);
        }
        
        .period-info-front,
        .period-info-back {
            backface-visibility: hidden;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            min-height: 200px;
            padding: 1.2rem 1.5rem;
            border-radius: 12px;
            overflow-y: auto;
        }
        
        .period-info-front {
            z-index: 2;
            transform: rotateY(0deg);
            background: var(--bg-secondary);
        }
        
        .period-info-back {
            transform: rotateY(180deg);
            background: var(--bg-elevated);
        }
        
        .period-info-back-title {
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--accent);
            color: var(--accent);
        }
        
        .period-info-back-context {
            font-size: 0.95rem;
            line-height: 1.6;
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }
        
        .period-info-chatgpt-link {
            display: inline-block;
            background: none;
            color: var(--text-muted);
            padding: 0;
            border-radius: 0;
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 400;
            transition: all 0.2s ease;
            position: absolute;
            bottom: 1rem;
            left: 1.5rem;
            opacity: 0.7;
            font-style: italic;
        }
        
        .period-info-chatgpt-link:hover {
            background: none;
            transform: none;
            box-shadow: none;
            opacity: 1;
            text-decoration: underline;
        }
        
        .period-info-flip-hint {
            position: absolute;
            bottom: 1rem;
            right: 1.5rem;
            font-size: 0.75rem;
            color: var(--text-muted);
            opacity: 0.7;
            font-style: italic;
        }

        .period-bar.active .period-info {
            opacity: 1;
            pointer-events: auto;
            transform: translateX(-50%) translateY(-25px);
        }
        
        .period-bar.active .period-info.flipped {
            transform: translateX(-50%) translateY(-25px) rotateY(180deg);
        }

        .period-info-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
            padding-bottom: 0.8rem;
            border-bottom: 1px solid var(--border);
        }

        .period-info-title {
            font-weight: 600;
            font-size: 1.3rem;
            line-height: 1.2;
            flex: 1;
        }

        .period-info-dates {
            font-family: 'Space Mono', monospace;
            font-size: 1rem;
            color: var(--accent);
            font-weight: 700;
            white-space: nowrap;
            margin-left: 1rem;
        }

        .period-info-duration {
            font-family: 'Space Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 0.3rem;
        }

        .period-info-description {
            font-size: 1rem;
            line-height: 1.6;
            color: var(--text-secondary);
            margin-bottom: 0.8rem;
        }

        .period-info-category {
            display: inline-block;
            padding: 0.3rem 0.8rem;
            font-family: 'Space Mono', monospace;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            border-radius: 12px;
            font-weight: 700;
        }

        .period-info.culturel .period-info-category {
            background: rgba(236, 72, 153, 0.15);
            color: var(--culturel);
            border: 2px solid var(--culturel);
        }
        .period-info.sportif .period-info-category {
            background: rgba(16, 185, 129, 0.15);
            color: var(--sportif);
            border: 2px solid var(--sportif);
        }
        .period-info.politique .period-info-category {
            background: rgba(239, 68, 68, 0.15);
            color: var(--politique);

</head>
<body>

    <nav class="main-nav">
        <!-- Ligne 1 : Ères -->
        <div class="nav-row">
            <div class="nav-section">
                <span class="nav-label">ÈRE</span>
                <div class="nav-buttons" id="era-buttons">

        <!-- Ligne 3 : Catégories à gauche + Recherche à droite -->
        <div class="nav-row space-between">

                <button class="filter-btn" data-category="sportif">Sportif</button>
                <button class="filter-btn" data-category="politique">Politique</button>
                <button class="filter-btn" data-category="economique">Économique</button>

    <div class="main-content">
        <div class="empty-state" id="empty-state">
            <div class="empty-state-icon">⏳</div>
            <div class="empty-state-text">
                Sélectionnez une ère et un siècle pour afficher la frise chronologique
            </div>
        </div>

        <div class="cards-zone hidden" id="cards-zone">
            <div class="cards-track" id="cards-track"></div>
        </div>

        <div class="timeline-container hidden" id="timeline-container">
            <div class="timeline-scroll" id="timeline-scroll">
                <div class="timeline-track" id="timeline-track">
                    <div class="timeline-line"></div>
                </div>
            </div>
        </div>

        <div class="periods-zone hidden" id="periods-zone">
            <div class="periods-track" id="periods-track"></div>
        </div>
    </div>

    <script>
        // ========================================
        // FRISE CHRONOLOGIQUE INTERACTIVE v10
        // Version Google Sheets
        // ========================================
        
        // ===== CONFIGURATION GOOGLE SHEETS =====
        const GOOGLE_SHEETS_URLS = {
            evenements: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTT1QOdjhRatGCfQvF7czEXiYrPqD9MaIr29WT6VVAoiNAZNPlQR44HCkwHW8NDs4E0dIWUwdu92UA3/pub?gid=220566018&single=true&output=csv',
            periodes: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTT1QOdjhRatGCfQvF7czEXiYrPqD9MaIr29WT6VVAoiNAZNPlQR44HCkwHW8NDs4E0dIWUwdu92UA3/pub?gid=1369526158&single=true&output=csv'
        };
        
        let isGoogleSheetsLoaded = false;
        
        // ===== FONCTION DE CHARGEMENT GOOGLE SHEETS =====
        async function loadGoogleSheets() {
            try {
                console.log('📥 Chargement Google Sheets...');
                
                // Charger événements
                const eventsResponse = await fetch(GOOGLE_SHEETS_URLS.evenements);
                const eventsCSV = await eventsResponse.text();
                const eventsLines = eventsCSV.split('\n');
                
                // Charger périodes
                const periodsResponse = await fetch(GOOGLE_SHEETS_URLS.periodes);
                const periodsCSV = await periodsResponse.text();
                const periodsLines = periodsCSV.split('\n');
                
                console.log(`📊 ${eventsLines.length - 1} événements trouvés`);
                console.log(`📊 ${periodsLines.length - 1} périodes trouvées`);
                
                // Parser événements (ignorer la ligne d'en-tête)
                for (let i = 1; i < eventsLines.length; i++) {
                    const line = eventsLines[i].trim();
                    if (!line) continue;
                    
                    // Parser CSV en tenant compte des guillemets
                    const cols = [];
                    let current = '';
                    let inQuotes = false;
                    
                    for (let char of line) {
                        if (char === '"') {
                            inQuotes = !inQuotes;
                        } else if (char === ',' && !inQuotes) {
                            cols.push(current.trim());
                            current = '';
                        } else {
                            current += char;
                        }
                    }
                    cols.push(current.trim());
                    
                    if (cols.length < 11) continue;
                    
                    const era = cols[5].replace(/"/g, '').trim();
                    const century = cols[4].replace(/"/g, '').trim();
                    
                    // Créer la structure si elle n'existe pas
                    if (!DATA[era]) DATA[era] = {};
                    if (!DATA[era][century]) DATA[era][century] = { events: [], periods: [] };
                    
                    // Ajouter l'événement
                    DATA[era][century].events.push({
                        year: parseInt(cols[2]),
                        date: cols[3].replace(/"/g, ''),
                        title: cols[1].replace(/"/g, ''),
                        location: cols[7].replace(/"/g, ''),
                        description: cols[8].replace(/"/g, ''),
                        category: cols[6].replace(/"/g, '').toLowerCase(),
                        context: cols[9].replace(/"/g, ''),
                        chatgpt_link: cols[10].replace(/"/g, '')
                    });
                }
                
                // Parser périodes
                for (let i = 1; i < periodsLines.length; i++) {
                    const line = periodsLines[i].trim();
                    if (!line) continue;
                    
                    const cols = [];
                    let current = '';
                    let inQuotes = false;
                    
                    for (let char of line) {
                        if (char === '"') {
                            inQuotes = !inQuotes;
                        } else if (char === ',' && !inQuotes) {
                            cols.push(current.trim());
                            current = '';
                        } else {
                            current += char;
                        }
                    }
                    cols.push(current.trim());
                    
                    if (cols.length < 13) continue;
                    
                    const era = cols[7].replace(/"/g, '').trim();
                    const century = cols[6].replace(/"/g, '').trim();
                    
                    if (!DATA[era]) DATA[era] = {};
                    if (!DATA[era][century]) DATA[era][century] = { events: [], periods: [] };
                    
                    DATA[era][century].periods.push({
                        title: cols[1].replace(/"/g, ''),
                        startYear: parseInt(cols[2]),
                        endYear: parseInt(cols[3]),
                        description: cols[10].replace(/"/g, ''),
                        category: cols[8].replace(/"/g, '').toLowerCase(),
                        context: cols[11].replace(/"/g, ''),
                        chatgpt_link: cols[12].replace(/"/g, '')
                    });
                }
                
                isGoogleSheetsLoaded = true;
                console.log('✅ Données Google Sheets chargées avec succès !');
                return true;
            } catch (error) {
                console.error('❌ Erreur chargement Google Sheets:', error);
                console.log('⚠️ Utilisation des données d\'exemple');
                return false;
            }
        }
        
        // ===== DONNÉES (chargées depuis Google Sheets) =====
        // Structure : DATA[ere][siecle] = { events: [], periods: [] }
        const DATA = {
            'antiquite': {},
            'moyen-age': {},
            'temps-modernes': {},
            'epoque-contemporaine': {}
        };
        
        // ===== CONFIGURATION DES SIÈCLES PAR ÈRE =====
        // Charger les données Google Sheets au démarrage
        (async function initApp() {
            await loadGoogleSheets();
            console.log('🎉 Application prête !');
        })();
        const CENTURIES = {
            'antiquite': [
                { id: '1-100', label: '1er siècle' },
                { id: '101-200', label: '2e siècle' },
                { id: '201-300', label: '3e siècle' },
                { id: '301-400', label: '4e siècle' },
                { id: '401-476', label: '5e siècle (jusqu\'à 476)' }
            ],
            'moyen-age': [
                { id: '476-500', label: '5e siècle (476-500)' },
                { id: '501-600', label: '6e siècle' },
                { id: '601-700', label: '7e siècle' },
                { id: '701-800', label: '8e siècle' },
                { id: '801-900', label: '9e siècle' },
                { id: '901-1000', label: '10e siècle' },
                { id: '1001-1100', label: '11e siècle' },
                { id: '1101-1200', label: '12e siècle' },
                { id: '1201-1300', label: '13e siècle' },
                { id: '1301-1400', label: '14e siècle' },
                { id: '1401-1492', label: '15e siècle (jusqu\'à 1492)' }
            ],
            'temps-modernes': [
                { id: '1492-1500', label: '15e siècle (1492-1500)' },
                { id: '1501-1600', label: '16e siècle' },
                { id: '1601-1700', label: '17e siècle' },
                { id: '1701-1789', label: '18e siècle (jusqu\'à 1789)' }
            ],
            'epoque-contemporaine': [
                { id: '1789-1800', label: '18e siècle (1789-1800)' },
                { id: '1801-1900', label: '19e siècle' },
                { id: '1901-2000', label: '20e siècle' },
                { id: '2001-2025', label: '21e siècle (jusqu\'à 2025)' }
            ]
        };

        // Variables
        let currentEra = null;
        let currentCentury = null;
        let currentEvents = [];
        let currentPeriods = [];
        let activeFilters = ['all'];
        let currentScrollPosition = 0;

        // ===== GESTION DE LA NAVIGATION (ÈRES ET SIÈCLES) =====
        // Gestion des ères
        document.querySelectorAll('#era-buttons .nav-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                currentEra = btn.dataset.era;
                
                // Activer le bouton
                document.querySelectorAll('#era-buttons .nav-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                // Générer les siècles
                const centuryContainer = document.getElementById('century-buttons');
                centuryContainer.innerHTML = '';
                
                CENTURIES[currentEra].forEach(century => {
                    const centuryBtn = document.createElement('button');
                    centuryBtn.className = 'nav-btn';
                    centuryBtn.textContent = century.label;
                    centuryBtn.dataset.century = century.id;
                    
                    centuryBtn.addEventListener('click', () => {
                        currentCentury = century.id;
                        
                        document.querySelectorAll('#century-buttons .nav-btn').forEach(b => b.classList.remove('active'));
                        centuryBtn.classList.add('active');
                        
                        showTimeline();
                    });
                    
                    centuryContainer.appendChild(centuryBtn);
                });
                
                hideTimeline();
            });
        });

        function hideTimeline() {
            document.getElementById('empty-state').classList.remove('hidden');
            document.getElementById('cards-zone').classList.add('hidden');
            document.getElementById('timeline-container').classList.add('hidden');
            document.getElementById('periods-zone').classList.add('hidden');
        }

        function showTimeline() {
            document.getElementById('empty-state').classList.add('hidden');
            document.getElementById('cards-zone').classList.remove('hidden');
            document.getElementById('timeline-container').classList.remove('hidden');
            document.getElementById('periods-zone').classList.remove('hidden');

            const data = DATA[currentEra] && DATA[currentEra][currentCentury] 
                ? DATA[currentEra][currentCentury] 
                : { events: [], periods: [] };
            
            currentEvents = data.events;
            currentPeriods = data.periods;

            renderTimeline();
        }

        function renderTimeline() {
            const [startYear, endYear] = currentCentury.split('-').map(Number);
            const timelineTrack = document.getElementById('timeline-track');
            const periodsTrack = document.getElementById('periods-track');
            const cardsTrack = document.getElementById('cards-track');
            
            timelineTrack.innerHTML = '<div class="timeline-line"></div>';
            periodsTrack.innerHTML = '';
            cardsTrack.innerHTML = '';

            const yearRange = endYear - startYear + 1;
            const pixelsPerYear = 50;
            const totalWidth = yearRange * pixelsPerYear;
            const viewportWidth = document.getElementById('timeline-scroll').clientWidth;
            const padding = viewportWidth / 2;

            timelineTrack.style.width = (totalWidth + padding * 2) + 'px';
            periodsTrack.style.width = (totalWidth + padding * 2) + 'px';
            cardsTrack.style.width = (totalWidth + padding * 2) + 'px';

            const filteredEvents = currentEvents.filter(event => {
                if (activeFilters.includes('all')) return true;
                return activeFilters.includes(event.category);
            });

            if (filteredEvents.length === 0) {
                cardsTrack.innerHTML = `
                    <div class="event-card" style="left: ${padding}px;">
                        <h2 class="event-card-title">Période sans données</h2>
                        <div class="event-card-description">
                            Aucun événement n'a encore été ajouté pour cette période.
                        </div>
                    </div>
                `;
            }

            // Créer les cartes ET les points à la même position
            filteredEvents.forEach(event => {
                const position = padding + (event.year - startYear) * pixelsPerYear;
                
                // Carte (240px de large, donc décalage de 120px pour centrer)
                const card = document.createElement('div');
                card.className = `event-card ${event.category}`;
                card.style.left = (position - 120) + 'px';
                card.innerHTML = `
                    <div class="event-card-front">
                        <div class="event-card-year">${event.year}</div>
                        <div class="event-card-date">${event.date}</div>
                        <h2 class="event-card-title">${event.title}</h2>
                        <div class="event-card-location">${event.location}</div>
                        <div class="event-card-description">${event.description}</div>
                        <div class="event-card-category">${event.category}</div>
                        ${event.context ? '<div class="event-card-flip-hint">🔄 Cliquer pour le contexte</div>' : ''}
                    </div>
                    ${event.context ? `
                        <div class="event-card-back">
                            <div class="event-card-back-title">${event.title}</div>
                            <div class="event-card-back-context">${event.context}</div>
                            <a href="${event.chatgpt_link || 'https://chat.openai.com/?q=' + encodeURIComponent('Parle-moi de : ' + event.title + ' (' + event.year + ')')}" 
                               target="_blank" 
                               class="event-card-chatgpt-link"
                               onclick="event.stopPropagation()">
                                💬 Approfondir
                            </a>
                            <div class="event-card-flip-hint">🔄 Cliquer pour revenir</div>
                        </div>
                    ` : ''}
                `;
                
                // Au clic : retourner la carte ET la faire passer au premier plan
                card.addEventListener('click', (e) => {
                    e.stopPropagation();
                    
                    // Retourner la carte
                    card.classList.toggle('flipped');
                    
                    // Réinitialiser le z-index de toutes les cartes
                    document.querySelectorAll('.event-card').forEach(c => {
                        c.style.zIndex = '100';
                    });
                    
                    // Mettre cette carte au premier plan
                    card.style.zIndex = '200';
                });
                
                cardsTrack.appendChild(card);

                // Point sur la frise
                const point = document.createElement('div');
                point.className = `timeline-point ${event.category}`;
                point.style.left = position + 'px';
                
                // Au clic sur un point, faire passer sa carte au premier plan
                point.addEventListener('click', (e) => {
                    e.stopPropagation();
                    
                    // Réinitialiser le z-index de toutes les cartes
                    document.querySelectorAll('.event-card').forEach(c => {
                        c.style.zIndex = '100';
                    });
                    
                    // Mettre la carte correspondante au premier plan
                    card.style.zIndex = '200';
                });
                
                timelineTrack.appendChild(point);
            });

            // Périodes - Filtrage par catégorie
            const filteredPeriods = currentPeriods.filter(period => {
                if (activeFilters.includes('all')) return true;
                return activeFilters.includes(period.category);
            });
            
            // Périodes - Algorithme anti-chevauchement (4 lignes disponibles)
            const periodLanes = [[], [], [], []]; // 4 lignes
            
            filteredPeriods.forEach((period, index) => {
                const bar = document.createElement('div');
                bar.className = `period-bar ${period.category}`;
                
                const startPos = padding + (period.startYear - startYear) * pixelsPerYear;
                const width = (period.endYear - period.startYear) * pixelsPerYear;
                const endPos = startPos + width;
                
                // Trouver la première ligne libre (sans chevauchement)
                let lane = 0;
                for (let i = 0; i < periodLanes.length; i++) {
                    let canFit = true;
                    for (const existing of periodLanes[i]) {
                        // Chevauchement si NOT (A termine avant B commence OU A commence après B termine)
                        if (!(endPos < existing.startPos || startPos > existing.endPos)) {
                            canFit = false;
                            break;
                        }
                    }
                    if (canFit) {
                        lane = i;
                        break;
                    }
                }
                
                // Enregistrer cette période dans sa ligne
                periodLanes[lane].push({ startPos, endPos });
                
                bar.style.left = startPos + 'px';
                bar.style.width = width + 'px';
                bar.style.top = (lane * 70) + 'px'; // 0px, 70px, 140px ou 210px selon la ligne
                
                const duration = period.endYear - period.startYear + 1;
                
                bar.innerHTML = `
                    <span class="period-title">${period.title}</span>
                    <div class="period-info ${period.category}">
                        <div class="period-info-front">
                            <div class="period-info-header">
                                <div style="flex: 1;">
                                    <div class="period-info-title">${period.title}</div>
                                    <div class="period-info-duration">${duration} ans (${period.startYear} – ${period.endYear})</div>
                                </div>
                                <div class="period-info-dates">${period.startYear} – ${period.endYear}</div>
                            </div>
                            <div class="period-info-description">${period.description}</div>
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 0.8rem;">
                                <div class="period-info-category">${period.category}</div>
                                ${period.context ? '<div class="period-info-flip-hint">🔄 Cliquer pour le contexte</div>' : ''}
                            </div>
                        </div>
                        ${period.context ? `
                            <div class="period-info-back">
                                <div class="period-info-back-title">${period.title}</div>
                                <div class="period-info-back-context">${period.context}</div>
                                <a href="${period.chatgpt_link || 'https://chat.openai.com/?q=' + encodeURIComponent('Parle-moi de : ' + period.title + ' (' + period.startYear + '-' + period.endYear + ')')}" 
                                   target="_blank" 
                                   class="period-info-chatgpt-link"
                                   onclick="event.stopPropagation()">
                                    💬 Approfondir
                                </a>
                                <div class="period-info-flip-hint">🔄 Cliquer pour revenir</div>
                            </div>
                        ` : ''}
                    </div>
                `;

                bar.addEventListener('click', (e) => {
                    e.stopPropagation();
                    
                    // Si la barre est déjà active, on la désactive
                    if (bar.classList.contains('active')) {
                        bar.classList.remove('active');
                        // Remettre la popup en recto
                        const periodInfo = bar.querySelector('.period-info');
                        if (periodInfo) periodInfo.classList.remove('flipped');
                    } else {
                        // Sinon on désactive toutes les autres et on active celle-ci
                        document.querySelectorAll('.period-bar').forEach(b => {
                            b.classList.remove('active');
                            const info = b.querySelector('.period-info');
                            if (info) info.classList.remove('flipped');
                        });
                        bar.classList.add('active');
                        
                        // Positionner la popup là où on a cliqué
                        const periodInfo = bar.querySelector('.period-info');
                        const barRect = bar.getBoundingClientRect();
                        const clickX = e.clientX - barRect.left;
                        const clickPercent = (clickX / barRect.width) * 100;
                        periodInfo.style.left = clickPercent + '%';
                        
                        // Ajouter le clic sur la popup pour la retourner
                        setTimeout(() => {
                            periodInfo.addEventListener('click', (evt) => {
                                evt.stopPropagation();
                                periodInfo.classList.toggle('flipped');
                            }, { once: false });
                        }, 100);
                    }
                });

                periodsTrack.appendChild(bar);
            });

            // Ajouter un écouteur sur le document pour fermer les encarts au clic ailleurs
            document.addEventListener('click', () => {
                document.querySelectorAll('.period-bar').forEach(b => b.classList.remove('active'));
            });

            // Ajouter des tirets et années pour chaque année
            for (let year = startYear; year <= endYear; year++) {
                const tickPosition = padding + (year - startYear) * pixelsPerYear;
                
                // Tiret de graduation
                const tick = document.createElement('div');
                tick.style.position = 'absolute';
                tick.style.left = tickPosition + 'px';
                tick.style.top = 'calc(50% - 15px)';
                tick.style.width = '1px';
                tick.style.height = '10px';
                tick.style.background = 'var(--text-muted)';
                tick.style.opacity = '0.3';
                timelineTrack.appendChild(tick);
                
                // Label année au-dessus du tiret
                const yearLabel = document.createElement('div');
                yearLabel.style.position = 'absolute';
                yearLabel.style.left = tickPosition + 'px';
                yearLabel.style.top = 'calc(50% - 30px)';
                yearLabel.style.transform = 'translateX(-50%)';
                yearLabel.style.fontFamily = "'Space Mono', monospace";
                yearLabel.style.fontSize = '0.65rem';
                yearLabel.style.color = 'var(--text-muted)';
                yearLabel.style.opacity = '0.5';
                yearLabel.style.whiteSpace = 'nowrap';
                yearLabel.textContent = year;
                timelineTrack.appendChild(yearLabel);
            }

            currentScrollPosition = 0;
            updateTimelinePosition();
        }

        function updateTimelinePosition() {
            document.getElementById('timeline-track').style.transform = `translateX(${currentScrollPosition}px)`;
            document.getElementById('periods-track').style.transform = `translateX(${currentScrollPosition}px)`;
            document.getElementById('cards-track').style.transform = `translateX(${currentScrollPosition}px)`;
        }

        // Scroll horizontal avec inertie pour fluidité
        const timelineContainer = document.getElementById('timeline-container');
        let scrollVelocity = 0;
        let isScrolling = false;
        
        function handleScroll(e) {
            if (!currentCentury) return;
            
            e.preventDefault();
            
            // Détecter si c'est un scroll horizontal (shift + molette ou trackpad)
            const delta = Math.abs(e.deltaX) > Math.abs(e.deltaY) ? e.deltaX : e.deltaY;
            
            // Réduire sensibilité pour plus de fluidité
            scrollVelocity = delta * 0.8;
            
            if (!isScrolling) {
                isScrolling = true;
                smoothScroll();
            }
        }
        
        function smoothScroll() {
            if (Math.abs(scrollVelocity) > 0.1) {
                currentScrollPosition -= scrollVelocity;
                scrollVelocity *= 0.85; // Décélération progressive (inertie)
                updateTimelinePosition();
                requestAnimationFrame(smoothScroll);
            } else {
                isScrolling = false;
                scrollVelocity = 0;
            }
        }
        
        timelineContainer.addEventListener('wheel', handleScroll, { passive: false });
        document.getElementById('cards-zone').addEventListener('wheel', handleScroll, { passive: false });
        document.getElementById('periods-zone').addEventListener('wheel', handleScroll, { passive: false });

        // Filtres
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const category = btn.dataset.category;
                
                if (category === 'all') {
                    activeFilters = ['all'];
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                } else {
                    document.querySelector('.filter-btn[data-category="all"]').classList.remove('active');
                    activeFilters = activeFilters.filter(f => f !== 'all');
                    
                    if (activeFilters.includes(category)) {
                        activeFilters = activeFilters.filter(f => f !== category);
                        btn.classList.remove('active');
                    } else {
                        activeFilters.push(category);
                        btn.classList.add('active');
                    }
                    
                    if (activeFilters.length === 0) {
                        activeFilters = ['all'];
                        document.querySelector('.filter-btn[data-category="all"]').classList.add('active');
                    }
                }

                if (currentCentury) renderTimeline();
            });
        });

        // ===== RECHERCHE =====
        const searchInput = document.getElementById('search-input');
        const searchResults = document.getElementById('search-results');

        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.trim().toLowerCase();
            
            if (query.length < 2) {
                searchResults.classList.add('hidden');
                searchResults.innerHTML = '';
                return;
            }

            // Rechercher dans toutes les données
            const results = [];
            
            for (const era in DATA) {
                for (const century in DATA[era]) {
                    // Événements
                    DATA[era][century].events?.forEach(event => {
                        if (event.title.toLowerCase().includes(query) || 
                            event.description.toLowerCase().includes(query)) {
                            results.push({
                                type: 'event',
                                title: event.title,
                                year: event.year,
                                era: era,
                                century: century,
                                category: event.category,
                                data: event
                            });
                        }
                    });
                    
                    // Périodes
                    DATA[era][century].periods?.forEach(period => {
                        if (period.title.toLowerCase().includes(query) || 
                            period.description.toLowerCase().includes(query)) {
                            results.push({
                                type: 'period',
                                title: period.title,
                                year: period.startYear,
                                era: era,
                                century: century,
                                category: period.category,
                                data: period
                            });
                        }
                    });
                }
            }

            if (results.length === 0) {
                searchResults.innerHTML = '<div class="search-result-item">Aucun résultat trouvé</div>';
                searchResults.classList.remove('hidden');
                return;
            }

            // Afficher les résultats
            searchResults.innerHTML = results.slice(0, 10).map(result => `
                <div class="search-result-item" data-era="${result.era}" data-century="${result.century}">
                    <div class="search-result-title">${result.title}</div>
                    <div class="search-result-meta">
                        ${result.type === 'event' ? result.year : `${result.data.startYear}-${result.data.endYear}`} • 
                        ${result.category} • 
                        ${result.era}
                    </div>
                </div>
            `).join('');
            searchResults.classList.remove('hidden');

            // Gérer le clic sur un résultat
            searchResults.querySelectorAll('.search-result-item').forEach((item, index) => {
                if (index >= results.length) return;
                const result = results[index];
                
                item.addEventListener('click', () => {
                    // Activer l'ère et le siècle
                    currentEra = result.era;
                    currentCentury = result.century;
                    
                    // Mettre à jour l'interface
                    document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
                    document.querySelector(`[data-era="${result.era}"]`)?.classList.add('active');
                    
                    loadCenturies(result.era);
                    loadData();
                    renderTimeline();
                    
                    // Fermer la recherche
                    searchResults.classList.add('hidden');
                    searchInput.value = '';
                });
            });
        });

        // Fermer les résultats si clic en dehors
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.search-box')) {
                searchResults.classList.add('hidden');
            }
        });
    </script>

</body>
</html>
